name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Ruff check
        run: ruff check src tests

  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ffmpeg / exiftool are required for the e2e test; unit tests run regardless.
      - name: Install ffmpeg + exiftool (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libimage-exiftool-perl

      - name: Install ffmpeg + exiftool (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg exiftool

      - name: Install ffmpeg + exiftool (Windows)
        if: runner.os == 'Windows'
        run: choco install -y ffmpeg exiftool

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -v
